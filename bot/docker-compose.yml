version: '3.8'

# ============================================
# Bot Service - Docker Compose
# ============================================
# Cách sử dụng:
#   LOCAL (dùng chung infra):
#     - Đảm bảo infra đã chạy: cd ../infra && docker-compose -f docker-compose.infra.yml up -d
#     - Chạy bot (migration sẽ tự động chạy khi container start):
#       docker-compose up -d
#     - Service sẽ tự động connect vào network shared_net từ infra
#     - Migration service vẫn có thể dùng riêng nếu cần:
#       docker-compose --profile migrate up migrate
#
#   PRODUCTION (tách riêng):
#     - Uncomment các service postgres, redis bên dưới
#     - Comment phần external network
#     - Chạy bot (migration tự động): docker-compose up -d
#     - Hoặc chạy migration riêng: docker-compose --profile migrate up migrate
# ============================================

services:
  # ============================================
  # Infrastructure Services (chỉ dùng khi PRODUCTION)
  # ============================================
  # Uncomment các service dưới đây nếu muốn tách riêng infra cho production
