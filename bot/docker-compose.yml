  #   ports:
  #     - "8389:5540"
  #   volumes:
  #     - redis_insight_data:/db
  #   depends_on:
  #     - redis
  #   networks:
  #     - bot_network
  #   restart: unless-stopped

  # Prometheus (Metrics collection)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: hub_prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
