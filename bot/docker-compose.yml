  #   volumes:
  #     - redis_data:/data
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - bot_network
  #   restart: unless-stopped
  #   profiles:
  #     - production

  # Qdrant Vector Database (for knowledge engine)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: bot_qdrant
  #   ports:
  #     - "6333:6333"  # HTTP API
  #     - "6334:6334"  # gRPC
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   networks:
  #     - bot_network
  #   restart: unless-stopped
  #   ulimits:
  #     nofile:
  #       soft: 65536
  #       hard: 65536
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # ============================================
  # Database Migration Service (runs once)
  # ============================================
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_migrate
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      ENVIRONMENT: dev
      TZ: Asia/Ho_Chi_Minh
      # LOCAL: Connect vào services từ infra
      DATABASE_URL: postgresql+asyncpg://bot_user:bot_pw@hub_postgres:5432/bot_db
      PYTHONPATH: /app
    networks:
      - shared_net  # LOCAL: Dùng chung network từ infra
      # - bot_network  # PRODUCTION: Uncomment để dùng network riêng
    restart: "no"  # Chỉ chạy một lần
    profiles:
      - migrate  # Chỉ chạy khi dùng profile migrate

  # ============================================
  # MCP DB Server Service
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_mcp_server
    entrypoint: []  # Override entrypoint để không chạy migrations
    command: ["python", "-m", "mcp_server.run_server"]
    volumes:
      - ./mcp_server:/app/mcp_server
      - ./backend:/app/backend  # For shared modules
    ports:
      - "8387:8387"
    env_file:
      - .env
    environment:
      ENVIRONMENT: dev
      MCP_SERVER_PORT: 8387
      MCP_SERVER_HOST: 0.0.0.0
      PYTHONPATH: /app
    networks:
      - shared_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8387/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Backend API Service
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_backend
    # Hãy bỏ --reload khi chạy production, chỉ dùng khi dev
    # Entrypoint script sẽ tự động chạy migration trước khi start app
    command: ["python", "-m", "uvicorn", "backend.interface.api:app", "--host", "0.0.0.0", "--port", "8386", "--reload"]
    volumes:
      # Mount source code phục vụ dev hot-reload - Đảm bảo backend code ở ./backend
      - ./backend:/app/backend
      - ./config:/app/config
      - ./embed.js:/app/embed.js  # Mount embed.js để hot-reload
    ports:
      - "8386:8386"
    env_file:
      - .env
    environment:
      ENVIRONMENT: dev
      DEBUG: "true"
      TZ: Asia/Ho_Chi_Minh
      # LOCAL: Connect vào services từ infra
      # PRODUCTION: Có thể giữ nguyên hoặc đổi hostname nếu dùng service riêng
      DATABASE_URL: postgresql+asyncpg://bot_user:bot_pw@hub_postgres:5432/bot_db
      REDIS_URL: redis://hub_redis:6379/0
      QDRANT_URL: http://hub_qdrant:6333
      MCP_DB_SERVER_URL: http://mcp-server:8387  # Use service name in Docker network
      PYTHONPATH: /app
    depends_on:
      - mcp-server  # Backend depends on MCP server
      # LOCAL: Sử dụng services từ infra (postgres, redis) - không cần depends_on vì dùng external network
      # PRODUCTION: Uncomment và sử dụng services local
      # - postgres:
      #     condition: service_healthy
      # - redis:
      #     condition: service_healthy
      # - qdrant:
      #     condition: service_started
    networks:
      - shared_net  # LOCAL: Dùng chung network từ infra
      # - bot_network  # PRODUCTION: Uncomment để dùng network riêng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8386/health"]
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 40s

