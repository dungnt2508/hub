# Intent Registry - Single Source of Truth
# Format: intent_name -> domain, intent_type, required_slots, optional_slots, source_allowed

intents:
  # HR Domain - OPERATION Intents
  - intent: query_leave_balance
    domain: hr
    intent_type: OPERATION
    required_slots: []
    optional_slots: []
    source_allowed: [PATTERN, EMBEDDING]
    description: "Query employee leave balance"
    
  - intent: create_leave_request
    domain: hr
    intent_type: OPERATION
    required_slots: [start_date, end_date, reason]
    optional_slots: [leave_type]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Create new leave request"
    
  - intent: approve_leave
    domain: hr
    intent_type: OPERATION
    required_slots: [leave_request_id]
    optional_slots: [comment]
    source_allowed: [PATTERN, EMBEDDING]
    description: "Approve leave request (manager only)"
    
  # HR Domain - KNOWLEDGE Intents
  - intent: knowledge_policy_leave
    domain: hr
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [topic]
    source_allowed: [EMBEDDING, LLM]
    description: "Query leave policy information"

  # Catalog Domain - KNOWLEDGE Intents
  # Router intents (from pattern rules) → Use case keys
  - intent: search_products
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [question, query, product_type, feature, tag]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Search for products/workflows in catalog"
    use_case_key: catalog.search
    
  - intent: search_by_category
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [question, query, product_type, feature, tag]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Search products by category"
    use_case_key: catalog.search
    
  - intent: query_product_detail
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [question, query, product_id]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Get information about specific product"
    use_case_key: catalog.info
    
  - intent: query_variant
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [question, query, product_id]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Query product variant information"
    use_case_key: catalog.info
    
  - intent: query_price
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [product_id, product_name]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Query product price"
    use_case_key: catalog.price
    
  - intent: check_availability
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [product_id, product_name]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Check product availability"
    use_case_key: catalog.availability
    
  - intent: compare_products
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [product_names, product_ids]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Compare multiple products"
    use_case_key: catalog.compare
    
  # Direct use case keys (for backward compatibility)
  - intent: catalog.search
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [question, query, product_type, feature, tag]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Search for products/workflows in catalog"
    use_case_key: catalog.search
    
  - intent: catalog.recommend
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [question, query, product_type, feature, tag]
    source_allowed: [EMBEDDING, LLM]
    description: "Get product recommendations based on needs"
    use_case_key: catalog.search  # Recommend uses search use case
    
  - intent: catalog.info
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [question, query, product_id]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Get information about specific product"
    use_case_key: catalog.info
    
  - intent: catalog.price
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [product_id, product_name]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Get product price"
    use_case_key: catalog.price
    
  - intent: catalog.availability
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [product_id, product_name]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Check product availability"
    use_case_key: catalog.availability
    
  - intent: catalog.compare
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [product_names, product_ids]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Compare multiple products"
    use_case_key: catalog.compare

  # Catalog Domain - OPERATION Intents (E-commerce Flow)
  - intent: add_to_cart
    domain: catalog
    intent_type: OPERATION
    required_slots: [product_id, quantity]
    optional_slots: [variant_id, product_name]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Add product to shopping cart"
    use_case_key: catalog.cart.add
    
  - intent: collect_customer_info
    domain: catalog
    intent_type: OPERATION
    required_slots: []
    optional_slots: [name, email, phone, address, payment_method, notes]
    source_allowed: [PATTERN, LLM]
    description: "Collect customer information for checkout"
    use_case_key: catalog.checkout.collect_info
    
  - intent: place_order
    domain: catalog
    intent_type: OPERATION
    required_slots: []
    optional_slots: [cart_id, customer_info, payment_method, shipping_method]
    source_allowed: [PATTERN, LLM]
    description: "Place order with cart items and customer info"
    use_case_key: catalog.checkout.place_order
    
  - intent: escalate_to_livechat
    domain: catalog
    intent_type: OPERATION
    required_slots: []
    optional_slots: [reason, context]
    source_allowed: [PATTERN, LLM, ESCALATION]
    description: "Escalate conversation to human support"
    use_case_key: catalog.support.escalate
    
  - intent: track_order
    domain: catalog
    intent_type: KNOWLEDGE
    required_slots: []
    optional_slots: [order_id, order_number]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Track order status"
    use_case_key: catalog.order.track
    
  - intent: post_purchase_care
    domain: catalog
    intent_type: OPERATION
    required_slots: []
    optional_slots: [order_id, issue_type, feedback]
    source_allowed: [PATTERN, LLM]
    description: "Post-purchase support and care"
    use_case_key: catalog.support.post_purchase

  # DBA Domain - OPERATION Intents
  - intent: analyze_slow_query
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_string, connection_name, connection_id, limit, min_duration_ms]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Analyze slow running queries"
    
  - intent: check_index_health
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_id, schema]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Check database index health and fragmentation"
    
  - intent: detect_blocking
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_id]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Detect blocking sessions and locks"
    
  - intent: analyze_wait_stats
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_id, limit]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Analyze database wait statistics"
    
  - intent: analyze_query_regression
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_id, query_hash, threshold_percent]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Detect query performance regression"
    
  - intent: detect_deadlock_pattern
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_id]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Detect deadlock patterns"
    
  - intent: analyze_io_pressure
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_id]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Analyze I/O pressure and workload"
    
  - intent: capacity_forecast
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_id, forecast_days]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Forecast database capacity needs"
    
  - intent: validate_custom_sql
    domain: dba
    intent_type: OPERATION
    required_slots: [sql_query]
    optional_slots: [db_type]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Validate SQL query syntax and performance"
    
  - intent: compare_sp_blitz_vs_custom
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [db_type, connection_id]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Compare sp_Blitz results with custom analysis"
    
  - intent: incident_triage
    domain: dba
    intent_type: OPERATION
    required_slots: [incident_description]
    optional_slots: [db_type, connection_id]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Triage and analyze database incidents"
    
  - intent: store_query_metrics
    domain: dba
    intent_type: OPERATION
    required_slots: [connection_id, database_type, query_hash, mean_time_ms, max_time_ms, total_calls]
    optional_slots: [rows_examined, rows_returned, metadata]
    source_allowed: [LLM]
    description: "Store query performance metrics for trending"
    
  - intent: get_active_alerts
    domain: dba
    intent_type: OPERATION
    required_slots: []
    optional_slots: [connection_id, limit]
    source_allowed: [PATTERN, EMBEDDING, LLM]
    description: "Get active database alerts"
